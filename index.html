<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fadi-o-mat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
          margin: 0;
          font-family: 'Press Start 2P', cursive;
          background: #000;
          color: #a0a;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          align-items: center;
          height: 100vh;
          padding-top: 20px;
        }

        h1 {
          color: #a0a;
          text-align: center;
          margin-bottom: 30px;
          font-size: 32px;
          text-shadow: 0 0 10px #a0a;
        }

        .container {
          display: flex;
          align-items: center;
          gap: 20px;
        }

        .side {
          display: flex;
          flex-direction: column;
          gap: 20px;
        }

        button {
          font-family: inherit;
          font-size: 14px;
          padding: 10px 20px;
          background: #000;
          color: #a0a;
          border: 2px solid #a0a;
          cursor: pointer;
          transition: 0.2s;
        }

        button:hover:not(:disabled) {
          background: #a0a;
          color: #000;
        }

        button:disabled {
          opacity: 0.4;
          cursor: not-allowed;
        }

        .selected {
          box-shadow: 0 0 15px #a0a;
          background: #a0a;
          color: #000;
        }

        .video-container {
          width: 600px;
          height: 400px;
          border: 4px solid #a0a;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #111;
        }

        video {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        #playButton {
          margin-top: 20px;
          padding: 15px 30px;
          font-size: 16px;
        }
    </style>
</head>
<body>
<h1>Fadi-o-mat</h1>
<div class="container">
    <!-- Left characters -->
    <div class="side" id="left-side">
        <button data-id="1">Schleimerin</button>
        <button data-id="2">Sportler</button>
        <button data-id="3">Schummler</button>
    </div>

    <!-- Video in center -->
    <div class="video-container">
        <video id="comboVideo">
            <source src="" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
    </div>

    <!-- Right characters -->
    <div class="side" id="right-side">
        <button data-id="1">Schlafmütze</button>
        <button data-id="2">BFFs</button>
        <button data-id="3">Beautyqueen</button>
    </div>
</div>

<!-- Play button -->
<button id="playButton" disabled>PLAY VIDEO</button>

<script>
    let leftSelection = null;
    let rightSelection = null;

    const leftButtons = document.querySelectorAll('#left-side button');
    const rightButtons = document.querySelectorAll('#right-side button');
    const video = document.getElementById('comboVideo');
    const playButton = document.getElementById('playButton');

    function updateVideo() {
      if (leftSelection && rightSelection) {
        const src = `${leftSelection}_${rightSelection}.mp4`;
        video.src = src;
      }
    }

    function highlightButtons() {
      leftButtons.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.id == leftSelection);
      });
      rightButtons.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.id == rightSelection);
      });
    }

    function checkPlayEnabled() {
      playButton.disabled = !(leftSelection && rightSelection);
    }

    leftButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        leftSelection = btn.dataset.id;
        highlightButtons();
        updateVideo();
        checkPlayEnabled();
      });
    });

    rightButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        rightSelection = btn.dataset.id;
        highlightButtons();
        updateVideo();
        checkPlayEnabled();
      });
    });

    playButton.addEventListener('click', () => {
      if (leftSelection && rightSelection) {
        video.play();
      }
    });
</script>
</body>
</html>
